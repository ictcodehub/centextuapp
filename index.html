<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Penyusun Soal Ujian</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Untuk compile JSX langsung di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PRESETS = [
          { id: 'ringkas', label: 'Mode Ringkas', desc: 'Memperpendek soal tanpa mengurangi makna', promptExtra: 'Buat kalimatnya menjadi sangat ringkas, padat, dan langsung ke intinya (to the point).' },
          { id: 'kontekstual', label: 'Mode Kontekstual', desc: 'Menambahkan narasi situasi nyata yang kaya detail dan imajinatif', promptExtra: 'Kembangkan soal ini dengan menambahkan cerita pengantar atau situasi keseharian yang LEBIH PANJANG, KAYA DETAIL, dan IMAJINATIF. Buat narasinya mengalir seperti cerita pendek yang seru bagi anak SD sebelum masuk ke inti pertanyaan. Hindari hasil yang terlalu singkat!' },
          { id: 'formal', label: 'Mode Formal', desc: 'Menggunakan bahasa lebih baku dan akademik', promptExtra: 'Gunakan bahasa Indonesia yang baik, benar, dan rapi secara tata bahasa, namun pastikan kosakatanya tetap bisa dipahami oleh anak SD.' },
          { id: 'variatif', label: 'Mode Variatif', desc: 'Mengubah struktur kalimat agar tidak monoton', promptExtra: 'Gunakan variasi struktur kalimat yang unik dan menarik (misalnya gaya bercerita, dialog ringan, atau kalimat majemuk) agar tidak terdengar kaku atau membosankan.' },
          { id: 'netral', label: 'Mode Netral', desc: 'Parafrase ringan tanpa perubahan gaya signifikan', promptExtra: 'Lakukan parafrase ringan saja agar kalimatnya lebih luwes dan enak dibaca tanpa mengubah gaya bahasa aslinya secara drastis.' }
        ];

        const SYSTEM_INSTRUCTION = `Kamu adalah Asisten Penyusun Soal Ujian Profesional. 

TUGAS UTAMA:
Ubah kalimat soal yang diberikan menjadi versi yang lebih ringkas, kontekstual, atau variatif sesuai dengan instruksi. Pastikan tidak mengubah makna, cerita, atau konsep asli, tidak mengubah tingkat kesulitan, dan tidak menambahkan informasi baru di luar konteks awal.

ATURAN WAJIB & TARGET AUDIENS (KELAS 6 SD):
1. Pertahankan inti cerita, tokoh, dan tujuan soal.
2. Jangan mengubah jawaban yang benar.
3. TARGET AUDIENS: Gunakan bahasa yang sangat sederhana, komunikatif, dan mudah ditangkap oleh anak usia 11-12 tahun (Kelas 6 SD).
4. KOSAKATA: Dilarang keras menggunakan bahasa yang terlalu teknis, kaku, atau istilah akademik tingkat tinggi.
5. KONTEKS: Buat situasi atau narasi lebih "relatable" dengan dunia keseharian anak SD.
6. Gunakan variasi struktur kalimat (tidak monoton atau template).
7. Jangan gunakan definisi langsung — tetap berbasis situasi/konteks.
8. Pastikan hasil akhir terasa natural seperti soal asli.

FORMAT OUTPUT:
HANYA berikan hasil teks soal akhir. Dilarang memberikan penjelasan, basa-basi, atau teks tambahan apapun. Jangan tulis label "Output:" atau sejenisnya.`;

        function App() {
          // Default diubah menggunakan endpoint Cerebras yang kompatibel dengan format OpenAI
          const [apiUrl, setApiUrl] = useState('https://api.cerebras.ai/v1/chat/completions');
          const [apiModel, setApiModel] = useState('llama3.1-8b');
          const [customApiKey, setCustomApiKey] = useState('');
          const [apiStatus, setApiStatus] = useState('idle'); // idle, checking, valid, invalid
          
          const [inputText, setInputText] = useState('');
          const [activePreset, setActivePreset] = useState('formal');
          const [lengthLevel, setLengthLevel] = useState(2);
          const [endingStyle, setEndingStyle] = useState('titik-titik');
          const [povStyle, setPovStyle] = useState('karakter');
          
          const [outputText, setOutputText] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          const [error, setError] = useState(null);
          const [copied, setCopied] = useState(false);
          const [showToast, setShowToast] = useState(false);

          // Load saved API config on mount
          useEffect(() => {
            const savedKey = localStorage.getItem('asisten_soal_api_key');
            const savedUrl = localStorage.getItem('asisten_soal_api_url');
            const savedModel = localStorage.getItem('asisten_soal_api_model');
            
            if (savedUrl) setApiUrl(savedUrl);
            if (savedModel) setApiModel(savedModel);
            
            if (savedKey) {
              setCustomApiKey(savedKey);
              // Langsung validasi dengan data yang tersimpan atau bawaan
              validateApiKey(savedKey, savedUrl || apiUrl, savedModel || apiModel);
            }
          }, []);

          // Fungsi validasi kini menggunakan format Universal OpenAI-Compatible
          const validateApiKey = async (keyToTest, urlToTest, modelToTest) => {
            if (!keyToTest.trim() || !urlToTest.trim() || !modelToTest.trim()) {
              setApiStatus('idle');
              return;
            }
            setApiStatus('checking');
            try {
              const response = await fetch(urlToTest, {
                method: 'POST',
                headers: { 
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${keyToTest}` // Standard format for Cerebras, OpenAI, Groq, etc.
                },
                body: JSON.stringify({ 
                  model: modelToTest,
                  messages: [{ role: 'user', content: 'Halo' }],
                  max_tokens: 10
                })
              });

              if (response.ok) {
                setApiStatus('valid');
                localStorage.setItem('asisten_soal_api_key', keyToTest);
                localStorage.setItem('asisten_soal_api_url', urlToTest);
                localStorage.setItem('asisten_soal_api_model', modelToTest);
              } else {
                setApiStatus('invalid');
                localStorage.removeItem('asisten_soal_api_key');
              }
            } catch (err) {
              setApiStatus('invalid');
              localStorage.removeItem('asisten_soal_api_key');
            }
          };

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          const generateWithRetry = async (payload, maxRetries = 3) => {
            const delays = [1000, 2000, 4000];
            let lastError;

            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(apiUrl, {
                  method: 'POST',
                  headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${customApiKey}`
                  },
                  body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
              } catch (err) {
                lastError = err;
                if (i < maxRetries - 1) await sleep(delays[i]);
              }
            }
            throw lastError;
          };

          // Auto-generate effect
          useEffect(() => {
            let isActive = true;

            if (!inputText.trim() || apiStatus !== 'valid') {
              if (!inputText.trim()) setOutputText('');
              setError(null);
              return;
            }

            const timer = setTimeout(async () => {
              setIsLoading(true);
              setError(null);
              setCopied(false);

              const activePresetObj = PRESETS.find(p => p.id === activePreset);
              
              const LENGTH_INSTRUCTIONS = {
                1: "Pendek: Buat sesingkat mungkin, to the point, maksimal 1 atau 2 kalimat pendek saja.",
                2: "Normal: Kalimat padat, kurangi basa-basi narasi, langsung pada arah pertanyaan.",
                3: "Sedang: Panjang kalimat menengah dan proporsional, seimbang antara narasi pengantar dan pertanyaan.",
                4: "Panjang: Tambahkan detail deskriptif, buat cerita pengantar lebih hidup sebelum masuk ke inti pertanyaan."
              };
              
              const ENDING_INSTRUCTIONS = {
                'titik-titik': 'WAJIB: Akhiri kalimat dengan empat buah titik ("....") untuk format soal isian. Jangan gunakan tanda tanya.',
                'tanya': 'WAJIB: Akhiri kalimat dengan tanda tanya ("?") karena ini adalah kalimat pertanyaan langsung.',
                'titik': 'WAJIB: Akhiri kalimat dengan satu titik (".") untuk format soal instruksi atau pernyataan. Jangan gunakan tanda tanya.'
              };
              
              const POV_INSTRUCTIONS = {
                'umum': 'WAJIB: Gunakan narasi objektif/umum. DILARANG menggunakan nama tokoh fiktif atau kata ganti orang (aku/kamu).',
                'karakter': 'WAJIB: Gunakan nama tokoh/karakter fiktif (misalnya: Andi, Siti, Budi) sebagai pelaku utama dalam narasi soal.',
                'pov1': 'WAJIB: Gunakan sudut pandang orang pertama ("aku" atau "saya") seolah-olah penulis soal yang mengalami kejadian tersebut.',
                'pov2': 'WAJIB: Gunakan sudut pandang orang kedua ("kamu" atau "kalian") seolah-olah siswa yang sedang mengerjakan soal ini yang berada langsung di dalam cerita tersebut.'
              };
              
              const userPrompt = `PRESET AKTIF:\n${activePresetObj.label}\n\nINSTRUKSI KHUSUS PRESET:\n${activePresetObj.promptExtra}\n\nATURAN PANJANG SOAL:\n${LENGTH_INSTRUCTIONS[lengthLevel]}\n\nATURAN GAYA NARASI/POV:\n${POV_INSTRUCTIONS[povStyle]}\n\nATURAN AKHIRAN KALIMAT:\n${ENDING_INSTRUCTIONS[endingStyle]}\n\nINPUT SOAL:\n${inputText}`;

              // Payload disesuaikan dengan format OpenAI Chat Completions API Universal
              const payload = {
                model: apiModel,
                messages: [
                  { role: "system", content: SYSTEM_INSTRUCTION },
                  { role: "user", content: userPrompt }
                ],
                temperature: 0.7
              };

              try {
                const result = await generateWithRetry(payload);
                // Parsing response dari format Universal OpenAI
                const text = result.choices?.[0]?.message?.content;
                
                if (isActive) {
                  if (text) {
                    setOutputText(text.trim());
                  } else {
                    throw new Error("Format respons tidak valid dari AI.");
                  }
                }
              } catch (err) {
                if (isActive) {
                  setError('Terjadi kesalahan. Pastikan konfigurasi Endpoint/Model/Key valid dan coba lagi.');
                  console.error(err);
                }
              } finally {
                if (isActive) setIsLoading(false);
              }
            }, 1000);

            return () => {
              isActive = false;
              clearTimeout(timer);
            };
          }, [inputText, activePreset, lengthLevel, endingStyle, povStyle, apiStatus]);

          const handleCopy = () => {
            if (outputText) {
              const textArea = document.createElement("textarea");
              textArea.value = outputText;
              document.body.appendChild(textArea);
              textArea.focus();
              textArea.select();
              try {
                document.execCommand('copy');
                setCopied(true);
                setShowToast(true);
                setTimeout(() => {
                  setCopied(false);
                  setShowToast(false);
                }, 3000);
              } catch (err) {
                console.error('Gagal menyalin teks', err);
              }
              document.body.removeChild(textArea);
            }
          };

          return (
            <div className="p-4 md:p-8 relative overflow-hidden">
              <div className="max-w-5xl mx-auto space-y-6">
                
                {/* Header */}
                <header className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex items-center gap-4">
                  <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center shrink-0 text-2xl">
                    <i className="fa-solid fa-book-open-reader"></i>
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold text-slate-800">Asisten Penyusun Soal Ujian</h1>
                    <p className="text-slate-500 text-sm">Perbaiki dan parafrase kalimat soal agar lebih kontekstual, jelas, dan profesional.</p>
                  </div>
                </header>

                {/* API Key Config Section (Universal API Support) */}
                <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                  <div className="flex items-center gap-3 mb-4">
                    <div className="w-10 h-10 bg-slate-100 text-slate-600 rounded-lg flex items-center justify-center text-lg shrink-0">
                      <i className="fa-solid fa-server"></i>
                    </div>
                    <div>
                      <h2 className="text-slate-800 font-semibold text-sm md:text-base">Konfigurasi Universal API</h2>
                      <p className="text-xs text-slate-500">Mendukung Cerebras, OpenAI, Groq, dan endpoint kompatibel lainnya.</p>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                    {/* Endpoint URL Input */}
                    <div className="md:col-span-5 space-y-1.5">
                      <label className="text-xs font-semibold text-slate-600">Endpoint URL</label>
                      <input
                        type="text"
                        value={apiUrl}
                        onChange={(e) => {
                          setApiUrl(e.target.value);
                          setApiStatus('idle');
                        }}
                        placeholder="https://api.cerebras.ai/v1/chat/completions"
                        className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all"
                      />
                    </div>

                    {/* Model ID Input */}
                    <div className="md:col-span-3 space-y-1.5">
                      <label className="text-xs font-semibold text-slate-600">Model ID</label>
                      <input
                        type="text"
                        value={apiModel}
                        onChange={(e) => {
                          setApiModel(e.target.value);
                          setApiStatus('idle');
                        }}
                        placeholder="llama3.1-8b"
                        className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all"
                      />
                    </div>

                    {/* API Key Input */}
                    <div className="md:col-span-4 space-y-1.5">
                      <label className="text-xs font-semibold text-slate-600">API Key / Bearer Token</label>
                      <div className="flex gap-2">
                        <input
                          type="password"
                          value={customApiKey}
                          onChange={(e) => {
                            setCustomApiKey(e.target.value);
                            setApiStatus('idle');
                          }}
                          placeholder="API Key..."
                          className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all"
                        />
                        <button
                          onClick={() => validateApiKey(customApiKey, apiUrl, apiModel)}
                          disabled={apiStatus === 'checking' || !customApiKey.trim() || !apiUrl.trim() || !apiModel.trim()}
                          className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-sm font-medium transition-colors disabled:opacity-50 flex items-center justify-center shrink-0 min-w-[90px]"
                        >
                          {apiStatus === 'checking' ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Validasi'}
                        </button>
                      </div>
                    </div>
                  </div>
                  
                  {/* API Status Label */}
                  <div className="mt-4 flex flex-wrap items-center gap-2 text-xs md:text-sm">
                    <span className="font-medium text-slate-600">Status Engine:</span>
                    {apiStatus === 'idle' && <span className="text-slate-600 bg-slate-100 px-3 py-1 rounded-full border border-slate-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-minus"></i> Menunggu Validasi</span>}
                    {apiStatus === 'checking' && <span className="text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-notch fa-spin"></i> Memeriksa Koneksi...</span>}
                    {apiStatus === 'valid' && <span className="text-green-700 bg-green-50 px-3 py-1 rounded-full border border-green-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-check"></i> Tersambung & Siap Digunakan</span>}
                    {apiStatus === 'invalid' && <span className="text-red-600 bg-red-50 px-3 py-1 rounded-full border border-red-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-xmark"></i> Konfigurasi Tidak Valid</span>}
                  </div>
                </section>

                <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                  
                  {/* Left Column: Input & Presets */}
                  <div className="md:col-span-7 space-y-6">
                    
                    <section className={`bg-white rounded-2xl shadow-sm border border-slate-200 p-6 transition-opacity ${apiStatus !== 'valid' ? 'opacity-50 pointer-events-none' : ''}`}>
                      <div className="flex items-center gap-2 mb-4 text-slate-800 font-semibold">
                        <i className="fa-regular fa-file-lines text-indigo-600"></i>
                        <h2>Soal Asli (Input)</h2>
                      </div>
                      <textarea
                        value={inputText}
                        onChange={(e) => setInputText(e.target.value)}
                        placeholder="Masukkan draf soal ujian yang ingin diperbaiki di sini..."
                        className="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all resize-none text-sm md:text-base"
                      />
                    </section>

                    <section className={`bg-white rounded-2xl shadow-sm border border-slate-200 p-6 transition-opacity ${apiStatus !== 'valid' ? 'opacity-50 pointer-events-none' : ''}`}>
                      <div className="flex items-center gap-2 mb-4 text-slate-800 font-semibold">
                        <i className="fa-solid fa-sliders text-indigo-600"></i>
                        <h2>Pengaturan Parafrase</h2>
                      </div>
                      
                      <div className="space-y-3">
                        <div className="relative">
                          <select
                            value={activePreset}
                            onChange={(e) => setActivePreset(e.target.value)}
                            className="w-full appearance-none bg-slate-50 border border-slate-200 text-slate-800 py-3 px-4 pr-10 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium cursor-pointer transition-all hover:bg-slate-100 text-sm md:text-base"
                          >
                            {PRESETS.map(preset => (
                              <option key={preset.id} value={preset.id}>
                                {preset.label}
                              </option>
                            ))}
                          </select>
                          <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <i className="fa-solid fa-chevron-down"></i>
                          </div>
                        </div>
                        <p className="text-xs md:text-sm text-slate-500 px-1">
                          {PRESETS.find(p => p.id === activePreset)?.desc}
                        </p>
                      </div>

                      {/* Slider Panjang Kalimat */}
                      <div className="mt-6 border-t border-slate-100 pt-5">
                        <div className="flex items-center justify-between mb-3">
                          <div className="flex items-center gap-2 text-slate-800 font-semibold text-sm">
                            <i className="fa-solid fa-timeline text-indigo-600"></i>
                            <h3>Panjang Kalimat: 
                              <span className="ml-1 text-indigo-600 font-bold">
                                {lengthLevel === 1 ? 'Pendek' : lengthLevel === 2 ? 'Normal' : lengthLevel === 3 ? 'Sedang' : 'Panjang'}
                              </span>
                            </h3>
                          </div>
                        </div>
                        <input
                          type="range"
                          min="1"
                          max="4"
                          step="1"
                          value={lengthLevel}
                          onChange={(e) => setLengthLevel(parseInt(e.target.value))}
                          className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                        />
                        <div className="flex justify-between text-xs text-slate-400 mt-2 px-1 font-medium">
                          <span>Pendek</span>
                          <span>Normal</span>
                          <span>Sedang</span>
                          <span>Panjang</span>
                        </div>
                      </div>

                      {/* Gaya Narasi / POV */}
                      <div className="mt-6 border-t border-slate-100 pt-5">
                        <div className="flex items-center gap-2 mb-3 text-slate-800 font-semibold text-sm">
                          <i className="fa-solid fa-users text-indigo-600"></i>
                          <h3>Gaya Narasi & POV</h3>
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          {[
                            { id: 'umum', label: 'Umum (Tanpa Tokoh)' },
                            { id: 'karakter', label: 'Karakter (Nama Tokoh)' },
                            { id: 'pov1', label: 'POV 1 (Aku/Saya)' },
                            { id: 'pov2', label: 'POV 2 (Kamu/Kalian)' }
                          ].map(style => (
                            <button
                              key={style.id}
                              onClick={() => setPovStyle(style.id)}
                              className={`py-2 px-2 text-xs md:text-sm font-medium rounded-lg transition-all border ${povStyle === style.id ? 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}
                            >
                              {style.label}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Gaya Akhiran Kalimat */}
                      <div className="mt-6 border-t border-slate-100 pt-5">
                        <div className="flex items-center gap-2 mb-3 text-slate-800 font-semibold text-sm">
                          <i className="fa-solid fa-font text-indigo-600"></i>
                          <h3>Gaya Akhiran Soal</h3>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-lg">
                          {[
                            { id: 'titik-titik', label: 'Isian (....)' },
                            { id: 'tanya', label: 'Tanya (?)' },
                            { id: 'titik', label: 'Pernyataan (.)' }
                          ].map(style => (
                            <button
                              key={style.id}
                              onClick={() => setEndingStyle(style.id)}
                              className={`flex-1 py-2 text-xs md:text-sm font-medium rounded-md transition-all ${endingStyle === style.id ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                              {style.label}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div className="mt-5 flex items-start gap-3 text-sm text-slate-600 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                        <i className="fa-regular fa-clock text-indigo-500 mt-0.5"></i>
                        <p>Mode <strong>Real-time</strong> aktif. Otomatis memproses soal 1 detik setelah Anda berhenti mengetik (jika API Key valid).</p>
                      </div>
                    </section>

                    {error && (
                      <div className="p-4 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3 text-red-700">
                        <i className="fa-solid fa-circle-exclamation mt-0.5"></i>
                        <p className="text-sm">{error}</p>
                      </div>
                    )}
                  </div>

                  {/* Right Column: Output */}
                  <div className="md:col-span-5">
                    <section className={`bg-white rounded-2xl shadow-sm border border-slate-200 p-6 h-full flex flex-col transition-opacity ${apiStatus !== 'valid' ? 'opacity-50 pointer-events-none' : ''}`}>
                      <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-2 text-slate-800 font-semibold">
                          <i className={`fa-solid fa-wand-magic-sparkles ${isLoading ? "text-indigo-600 animate-pulse" : "text-green-600"}`}></i>
                          <h2>Hasil Final {isLoading && <span className="text-xs md:text-sm font-normal text-indigo-600 ml-2 animate-pulse">(Memproses...)</span>}</h2>
                        </div>
                        {outputText && !isLoading && (
                          <button
                            onClick={handleCopy}
                            className="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors flex items-center gap-2 text-xs md:text-sm font-medium"
                            title="Salin Teks"
                          >
                            {copied ? <i className="fa-solid fa-circle-check text-green-600"></i> : <i className="fa-regular fa-copy"></i>}
                            {copied ? 'Tersalin!' : 'Salin'}
                          </button>
                        )}
                      </div>
                      
                      <div className={`flex-1 rounded-xl p-5 border min-h-[300px] whitespace-pre-wrap leading-relaxed text-sm md:text-base
                        ${outputText ? 'bg-green-50/30 border-green-200 text-slate-800' : 'bg-slate-50 border-slate-200 text-slate-400 flex items-center justify-center text-center'}
                      `}>
                        {outputText ? (
                          outputText
                        ) : (
                          <p className="text-sm">Area input dan pengaturan akan terkunci sebelum konfigurasi divalidasi.<br/><br/>Setelah valid, hasil soal yang diperbaiki akan muncul di sini secara otomatis.</p>
                        )}
                      </div>
                    </section>
                  </div>

                </div>
              </div>

              {/* Toast Notification */}
              <div 
                className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 transform
                  ${showToast ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0 pointer-events-none'}
                `}
              >
                <div className="bg-slate-800 text-white px-5 py-3 rounded-full shadow-2xl border border-slate-700 flex items-center gap-3">
                  <div className="bg-green-500/20 p-1 rounded-full flex items-center justify-center">
                    <i className="fa-solid fa-circle-check text-green-400"></i>
                  </div>
                  <span className="text-sm font-medium">Soal berhasil disalin ke clipboard!</span>
                </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
