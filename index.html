<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Penyusun Soal Ujian</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Scrollbar untuk tampilan Dashboard Profesional */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PRESETS = [
          { id: 'ringkas', label: 'Mode Ringkas', desc: 'Memperpendek soal tanpa mengurangi makna', promptExtra: 'Buat kalimatnya menjadi sangat ringkas, padat, dan langsung ke intinya (to the point).' },
          { id: 'kontekstual', label: 'Mode Kontekstual', desc: 'Menambahkan narasi kaya detail dan imajinatif', promptExtra: 'Kembangkan soal ini dengan menambahkan cerita pengantar atau situasi keseharian yang LEBIH PANJANG, KAYA DETAIL, dan IMAJINATIF. Buat narasinya mengalir seperti cerita pendek yang seru bagi anak SD sebelum masuk ke inti pertanyaan. Hindari hasil yang terlalu singkat!' },
          { id: 'formal', label: 'Mode Formal', desc: 'Menggunakan bahasa baku namun ramah', promptExtra: 'Gunakan bahasa Indonesia yang baik, benar, dan rapi secara tata bahasa, namun pastikan kosakatanya tetap bisa dipahami oleh anak SD.' },
          { id: 'variatif', label: 'Mode Variatif', desc: 'Mengubah struktur kalimat agar tidak kaku', promptExtra: 'Gunakan variasi struktur kalimat yang unik dan menarik (misalnya gaya bercerita, dialog ringan, atau kalimat majemuk) agar tidak terdengar kaku atau membosankan.' },
          { id: 'netral', label: 'Mode Netral', desc: 'Parafrase ringan dan halus', promptExtra: 'Lakukan parafrase ringan saja agar kalimatnya lebih luwes dan enak dibaca tanpa mengubah gaya bahasa aslinya secara drastis.' }
        ];

        const SYSTEM_INSTRUCTION = `Kamu adalah Asisten Penyusun Soal Ujian Profesional. 

TUGAS UTAMA:
Ubah kalimat soal yang diberikan menjadi versi yang lebih ringkas, kontekstual, atau variatif sesuai dengan instruksi. Pastikan tidak mengubah makna, cerita, atau konsep asli, tidak mengubah tingkat kesulitan, dan tidak menambahkan informasi baru di luar konteks awal.

ATURAN WAJIB & TARGET AUDIENS (KELAS 6 SD):
1. Pertahankan inti cerita, tokoh, dan tujuan soal.
2. Jangan mengubah jawaban yang benar.
3. TARGET AUDIENS: Gunakan bahasa yang sangat sederhana, komunikatif, dan mudah ditangkap oleh anak usia 11-12 tahun (Kelas 6 SD).
4. KOSAKATA: Dilarang keras menggunakan bahasa yang terlalu teknis, kaku, atau istilah akademik tingkat tinggi.
5. KONTEKS: Buat situasi atau narasi lebih "relatable" dengan dunia keseharian anak SD.
6. Gunakan variasi struktur kalimat (tidak monoton atau template).
7. Jangan gunakan definisi langsung — tetap berbasis situasi/konteks.
8. Pastikan hasil akhir terasa natural seperti soal asli.

FORMAT OUTPUT:
HANYA berikan hasil teks soal akhir. Dilarang memberikan penjelasan, basa-basi, atau teks tambahan apapun. Jangan tulis label "Output:" atau sejenisnya.`;

        function App() {
          const [apiUrl, setApiUrl] = useState('https://api.cerebras.ai/v1/chat/completions');
          const [apiModel, setApiModel] = useState('llama3.1-8b');
          const [customApiKey, setCustomApiKey] = useState('');
          const [apiStatus, setApiStatus] = useState('idle'); 
          
          const [inputText, setInputText] = useState('');
          const [activePreset, setActivePreset] = useState('formal');
          const [lengthLevel, setLengthLevel] = useState(2);
          const [endingStyle, setEndingStyle] = useState('titik-titik');
          const [povStyle, setPovStyle] = useState('karakter');
          
          const [outputText, setOutputText] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          const [error, setError] = useState(null);
          const [copied, setCopied] = useState(false);
          const [showToast, setShowToast] = useState(false);

          useEffect(() => {
            const savedKey = localStorage.getItem('asisten_soal_api_key');
            const savedUrl = localStorage.getItem('asisten_soal_api_url');
            const savedModel = localStorage.getItem('asisten_soal_api_model');
            
            if (savedUrl) setApiUrl(savedUrl);
            if (savedModel) setApiModel(savedModel);
            
            if (savedKey) {
              setCustomApiKey(savedKey);
              validateApiKey(savedKey, savedUrl || apiUrl, savedModel || apiModel);
            }
          }, []);

          const validateApiKey = async (keyToTest, urlToTest, modelToTest) => {
            if (!keyToTest.trim() || !urlToTest.trim() || !modelToTest.trim()) {
              setApiStatus('idle');
              return;
            }
            setApiStatus('checking');
            try {
              const response = await fetch(urlToTest, {
                method: 'POST',
                headers: { 
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${keyToTest}`
                },
                body: JSON.stringify({ 
                  model: modelToTest,
                  messages: [{ role: 'user', content: 'Halo' }],
                  max_tokens: 10
                })
              });

              if (response.ok) {
                setApiStatus('valid');
                localStorage.setItem('asisten_soal_api_key', keyToTest);
                localStorage.setItem('asisten_soal_api_url', urlToTest);
                localStorage.setItem('asisten_soal_api_model', modelToTest);
              } else {
                setApiStatus('invalid');
                localStorage.removeItem('asisten_soal_api_key');
              }
            } catch (err) {
              setApiStatus('invalid');
              localStorage.removeItem('asisten_soal_api_key');
            }
          };

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          const generateWithRetry = async (payload, maxRetries = 3) => {
            const delays = [1000, 2000, 4000];
            let lastError;

            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(apiUrl, {
                  method: 'POST',
                  headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${customApiKey}`
                  },
                  body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
              } catch (err) {
                lastError = err;
                if (i < maxRetries - 1) await sleep(delays[i]);
              }
            }
            throw lastError;
          };

          useEffect(() => {
            let isActive = true;

            if (!inputText.trim() || apiStatus !== 'valid') {
              if (!inputText.trim()) setOutputText('');
              setError(null);
              return;
            }

            const timer = setTimeout(async () => {
              setIsLoading(true);
              setError(null);
              setCopied(false);

              const activePresetObj = PRESETS.find(p => p.id === activePreset);
              
              const LENGTH_INSTRUCTIONS = {
                1: "Pendek: Buat sesingkat mungkin, to the point, maksimal 1 atau 2 kalimat pendek saja.",
                2: "Normal: Kalimat padat, kurangi basa-basi narasi, langsung pada arah pertanyaan.",
                3: "Sedang: Panjang kalimat menengah dan proporsional, seimbang antara narasi pengantar dan pertanyaan.",
                4: "Panjang: Tambahkan detail deskriptif, buat cerita pengantar lebih hidup sebelum masuk ke inti pertanyaan."
              };
              
              const ENDING_INSTRUCTIONS = {
                'titik-titik': 'Ubah menjadi kalimat rumpang (isian). WAJIB diakhiri dengan empat titik ("...."). DILARANG menggunakan tanda tanya.',
                'tanya': 'Ubah menjadi kalimat tanya langsung. WAJIB diakhiri dengan tanda tanya ("?").',
                'titik': 'Ubah menjadi instruksi atau pernyataan (contoh: "Jelaskan...", "Sebutkan...", "Bantu aku..."). JANGAN buat kalimat tanya. WAJIB diakhiri dengan satu titik (".").'
              };
              
              const POV_INSTRUCTIONS = {
                'umum': 'WAJIB: Gunakan narasi objektif/umum. DILARANG menggunakan nama tokoh fiktif atau kata ganti orang (aku/kamu).',
                'karakter': 'WAJIB: Gunakan nama tokoh/karakter fiktif (misalnya: Andi, Siti, Budi) sebagai pelaku utama dalam narasi soal.',
                'pov1': 'WAJIB: Gunakan sudut pandang orang pertama ("aku" atau "saya") seolah-olah penulis soal yang mengalami kejadian tersebut.',
                'pov2': 'WAJIB: Gunakan sudut pandang orang kedua ("kamu" atau "kalian") seolah-olah siswa yang sedang mengerjakan soal ini yang berada langsung di dalam cerita tersebut.'
              };
              
              const userPrompt = `INPUT SOAL MENTAH:\n"${inputText}"\n\n=== IKUTI ATURAN DI BAWAH INI SECARA KETAT ===\n1. PRESET (${activePresetObj.label}): ${activePresetObj.promptExtra}\n2. PANJANG SOAL: ${LENGTH_INSTRUCTIONS[lengthLevel]}\n3. POV/NARASI: ${POV_INSTRUCTIONS[povStyle]}\n4. FORMAT AKHIRAN (SANGAT FATAL): ${ENDING_INSTRUCTIONS[endingStyle]}`;

              const payload = {
                model: apiModel,
                messages: [
                  { role: "system", content: SYSTEM_INSTRUCTION },
                  { role: "user", content: userPrompt }
                ],
                temperature: 0.7
              };

              try {
                const result = await generateWithRetry(payload);
                let text = result.choices?.[0]?.message?.content;
                
                if (isActive) {
                  if (text) {
                    text = text.trim();
                    
                    // Lapis Ke-2: Post-processing untuk garansi 100% akhiran selalu akurat
                    text = text.replace(/[\?\.\s]+$/, ''); // Hapus paksa semua tanda baca di akhir
                    if (endingStyle === 'titik') text += '.';
                    else if (endingStyle === 'titik-titik') text += '....';
                    else if (endingStyle === 'tanya') text += '?';

                    setOutputText(text);
                  } else {
                    throw new Error("Format respons tidak valid dari AI.");
                  }
                }
              } catch (err) {
                if (isActive) {
                  setError('Terjadi kesalahan. Pastikan API stabil.');
                  console.error(err);
                }
              } finally {
                if (isActive) setIsLoading(false);
              }
            }, 1000);

            return () => {
              isActive = false;
              clearTimeout(timer);
            };
          }, [inputText, activePreset, lengthLevel, endingStyle, povStyle, apiStatus]);

          const handleCopy = () => {
            if (outputText) {
              const textArea = document.createElement("textarea");
              textArea.value = outputText;
              document.body.appendChild(textArea);
              textArea.focus();
              textArea.select();
              try {
                document.execCommand('copy');
                setCopied(true);
                setShowToast(true);
                setTimeout(() => {
                  setCopied(false);
                  setShowToast(false);
                }, 3000);
              } catch (err) {
                console.error('Gagal menyalin teks', err);
              }
              document.body.removeChild(textArea);
            }
          };

          return (
            <div className="flex flex-col h-full w-full overflow-hidden">
              
              {/* NAVBAR (Fixed Height) */}
              <header className="shrink-0 h-16 bg-white border-b border-slate-200 px-4 md:px-6 flex items-center justify-between z-20 shadow-sm">
                
                {/* Brand Logo & Title */}
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center text-sm shadow-sm">
                    <i className="fa-solid fa-book-open-reader"></i>
                  </div>
                  <div className="hidden md:block">
                    <h1 className="text-base font-bold text-slate-800 leading-tight">Asisten Penyusun Soal</h1>
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Pro Dashboard</p>
                  </div>
                </div>

                {/* API Setup - Compact Inline Bar */}
                <div className="flex flex-wrap md:flex-nowrap items-center gap-3 w-full md:w-auto justify-end">
                  
                  {/* Status Badge */}
                  <div className="hidden lg:flex">
                    {apiStatus === 'idle' && <span className="text-slate-500 bg-slate-100 px-2.5 py-1 rounded-md text-xs font-semibold border border-slate-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-minus"></i> Menunggu Key</span>}
                    {apiStatus === 'checking' && <span className="text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md text-xs font-semibold border border-blue-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-notch fa-spin"></i> Validasi...</span>}
                    {apiStatus === 'valid' && <span className="text-green-700 bg-green-50 px-2.5 py-1 rounded-md text-xs font-semibold border border-green-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-check"></i> Connected</span>}
                    {apiStatus === 'invalid' && <span className="text-red-600 bg-red-50 px-2.5 py-1 rounded-md text-xs font-semibold border border-red-200 flex items-center gap-1.5"><i className="fa-solid fa-circle-xmark"></i> Invalid Key</span>}
                  </div>

                  {/* Integrated Input Group */}
                  <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-1 w-full md:w-auto overflow-hidden">
                    <input type="text" value={apiUrl} onChange={(e) => { setApiUrl(e.target.value); setApiStatus('idle'); }} placeholder="https://api..." title="Endpoint URL" className="bg-transparent px-2 py-1 text-xs outline-none w-28 md:w-48 placeholder-slate-400 text-slate-700" />
                    <div className="w-px h-4 bg-slate-300 mx-1"></div>
                    <input type="text" value={apiModel} onChange={(e) => { setApiModel(e.target.value); setApiStatus('idle'); }} placeholder="Model ID..." title="Model ID" className="bg-transparent px-2 py-1 text-xs outline-none w-20 md:w-28 placeholder-slate-400 text-slate-700 hidden sm:block" />
                    <div className="w-px h-4 bg-slate-300 mx-1 hidden sm:block"></div>
                    <input type="password" value={customApiKey} onChange={(e) => { setCustomApiKey(e.target.value); setApiStatus('idle'); }} placeholder="Bearer / API Key..." title="API Key" className="bg-transparent px-2 py-1 text-xs outline-none w-28 md:w-40 placeholder-slate-400 text-slate-700" />
                  </div>
                  
                  <button onClick={() => validateApiKey(customApiKey, apiUrl, apiModel)} disabled={apiStatus === 'checking' || !customApiKey.trim()} className="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-xs font-semibold transition-colors disabled:opacity-50 shrink-0 shadow-sm flex items-center gap-1.5">
                    {apiStatus === 'checking' ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-plug"></i>}
                    <span className="hidden sm:inline">Connect</span>
                  </button>

                </div>
              </header>

              {/* MAIN WORKSPACE (Takes remaining height) */}
              <main className={`flex-1 flex flex-col md:flex-row overflow-hidden p-3 gap-3 ${apiStatus !== 'valid' ? 'opacity-60 pointer-events-none' : ''}`}>
                
                {/* COLUMN 1: SIDEBAR CONTROLS */}
                <aside className="w-full md:w-64 lg:w-72 shrink-0 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-full">
                  <div className="p-3 bg-slate-50 border-b border-slate-200 shrink-0">
                    <h2 className="text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center gap-2"><i className="fa-solid fa-sliders text-indigo-500"></i> Pengaturan</h2>
                  </div>
                  
                  {/* Scrollable Settings Content */}
                  <div className="flex-1 overflow-y-auto p-4 space-y-5">
                    
                    {/* Presets */}
                    <div className="space-y-2">
                      <label className="text-[11px] font-bold text-slate-500 uppercase">Mode Parafrase</label>
                      <div className="relative">
                        <select value={activePreset} onChange={(e) => setActivePreset(e.target.value)} className="w-full appearance-none bg-slate-50 border border-slate-200 text-slate-700 py-2 pl-3 pr-8 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-sm cursor-pointer hover:bg-slate-100 transition-colors">
                          {PRESETS.map(preset => (<option key={preset.id} value={preset.id}>{preset.label}</option>))}
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400"><i className="fa-solid fa-chevron-down text-xs"></i></div>
                      </div>
                      <p className="text-[11px] text-slate-400 leading-tight">{PRESETS.find(p => p.id === activePreset)?.desc}</p>
                    </div>

                    {/* Length Slider */}
                    <div className="space-y-2">
                      <div className="flex items-center justify-between">
                        <label className="text-[11px] font-bold text-slate-500 uppercase">Panjang Kalimat</label>
                        <span className="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded border border-indigo-100">
                          {lengthLevel === 1 ? 'Pendek' : lengthLevel === 2 ? 'Normal' : lengthLevel === 3 ? 'Sedang' : 'Panjang'}
                        </span>
                      </div>
                      <input type="range" min="1" max="4" step="1" value={lengthLevel} onChange={(e) => setLengthLevel(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                      <div className="flex justify-between text-[9px] text-slate-400 font-bold uppercase tracking-wider">
                        <span>Min</span><span>Max</span>
                      </div>
                    </div>

                    {/* POV / Narasi */}
                    <div className="space-y-2">
                      <label className="text-[11px] font-bold text-slate-500 uppercase">Sudut Pandang (POV)</label>
                      <div className="grid grid-cols-2 gap-1.5">
                        {[
                          { id: 'umum', label: 'Umum' }, { id: 'karakter', label: 'Nama Tokoh' },
                          { id: 'pov1', label: 'Aku/Saya' }, { id: 'pov2', label: 'Kamu/Kalian' }
                        ].map(style => (
                          <button key={style.id} onClick={() => setPovStyle(style.id)} className={`py-1.5 px-2 text-[11px] font-semibold rounded-md transition-all border ${povStyle === style.id ? 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}>
                            {style.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Akhiran Kalimat */}
                    <div className="space-y-2">
                      <label className="text-[11px] font-bold text-slate-500 uppercase">Akhiran Kalimat</label>
                      <div className="flex flex-col gap-1.5">
                        {[
                          { id: 'titik-titik', label: 'Isian (...)' },
                          { id: 'tanya', label: 'Pertanyaan (?)' },
                          { id: 'titik', label: 'Pernyataan (.)' }
                        ].map(style => (
                          <button key={style.id} onClick={() => setEndingStyle(style.id)} className={`py-1.5 px-2 text-xs font-semibold rounded-md transition-all border text-left ${endingStyle === style.id ? 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}>
                            <i className={`fa-solid fa-${endingStyle === style.id ? 'circle-dot' : 'circle'} text-[8px] mr-2 opacity-50`}></i> {style.label}
                          </button>
                        ))}
                      </div>
                    </div>
                    
                  </div>
                </aside>

                {/* COLUMN 2: INPUT EDITOR */}
                <section className="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-full min-w-0">
                  <div className="p-3 bg-slate-50 border-b border-slate-200 shrink-0 flex items-center justify-between">
                    <h2 className="text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center gap-2"><i className="fa-regular fa-file-lines text-blue-500"></i> Draft Soal Asli</h2>
                  </div>
                  <div className="flex-1 p-0 relative">
                    <textarea 
                      value={inputText} 
                      onChange={(e) => setInputText(e.target.value)} 
                      placeholder="Ketik soal mentah atau draft Anda di sini..." 
                      className="absolute inset-0 w-full h-full p-4 resize-none outline-none text-sm leading-relaxed text-slate-700 bg-white placeholder-slate-300"
                    />
                  </div>
                </section>

                {/* COLUMN 3: OUTPUT RESULT */}
                <section className="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-full min-w-0 relative">
                  <div className="p-3 bg-slate-50 border-b border-slate-200 shrink-0 flex items-center justify-between">
                    <h2 className="text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center gap-2">
                      <i className={`fa-solid fa-wand-magic-sparkles ${isLoading ? "text-indigo-500 animate-pulse" : "text-green-500"}`}></i> 
                      Hasil AI {isLoading && <span className="normal-case font-normal text-indigo-500 text-[10px] animate-pulse ml-1">(Processing...)</span>}
                    </h2>
                    {outputText && !isLoading && (
                      <button onClick={handleCopy} className="text-[11px] font-bold text-slate-500 hover:text-indigo-600 flex items-center gap-1.5 transition-colors bg-white border border-slate-200 px-2 py-0.5 rounded shadow-sm">
                        {copied ? <i className="fa-solid fa-check text-green-500"></i> : <i className="fa-regular fa-copy"></i>} {copied ? 'Copied!' : 'Copy'}
                      </button>
                    )}
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 bg-[#f8fafc] relative">
                    {error && (
                      <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2 text-red-700 text-xs">
                        <i className="fa-solid fa-circle-exclamation mt-0.5"></i>
                        <p>{error}</p>
                      </div>
                    )}
                    
                    {outputText ? (
                      <div className="whitespace-pre-wrap leading-relaxed text-sm text-slate-800 font-medium">
                        {outputText}
                      </div>
                    ) : (
                      <div className="h-full flex flex-col items-center justify-center text-slate-300 gap-3">
                        <i className="fa-solid fa-robot text-4xl opacity-20"></i>
                        <p className="text-xs text-center px-6">Input soal Anda di kolom tengah,<br/>hasil yang diparafrase akan otomatis muncul di sini.</p>
                      </div>
                    )}
                  </div>
                </section>

              </main>

              {/* Toast Notification */}
              <div className={`fixed bottom-6 right-6 z-50 transition-all duration-300 transform ${showToast ? 'translate-y-0 opacity-100' : 'translate-y-4 opacity-0 pointer-events-none'}`}>
                <div className="bg-slate-800 text-white px-4 py-2.5 rounded-lg shadow-xl border border-slate-700 flex items-center gap-3">
                  <i className="fa-solid fa-circle-check text-green-400"></i>
                  <span className="text-xs font-semibold">Teks tersalin ke clipboard!</span>
                </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
